name: Claude

# Responds to @claude mentions in issues / PR comments / reviews. Pattern from
# vendor/wshobson-agents/.github/workflows/claude.yml. Gated on author_association
# so only OWNER/MEMBER/COLLABORATOR (who already have write) can trigger a job
# that holds write scopes. Uses the single ANTHROPIC_API_KEY secret (shared with
# the eval workflow) so there's only one secret to manage. Tool allowlist is
# tailored to Wingman's node-validator toolchain and read-only git/gh — the
# action itself performs any commit via the GitHub API, so local
# add/commit/push (and destructive git) are deliberately not reachable.
#
# Also gated on the secret actually being present -- computed into the job's
# HAS_ANTHROPIC_KEY env var below (env: CAN reference secrets) and read back
# via env.* on the claude-code-action step's own `if:`. `secrets` is not a
# valid context inside if: at all, job- or step-level (actionlint rejected
# both direct attempts as an expression error before this env-var indirection
# was found). Confirmed by a real failure on claude-code-review.yml (PR #9):
# without this guard, the step runs anyway, gets partway into
# claude-code-action's own git-auth step with no usable token, and fails with
# a red X plus a stale "Claude Code is working…" comment -- not a graceful
# no-op. This guard makes it skip cleanly instead.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, edited]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)
      ) ||
      (
        github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # secrets are not a valid context inside if: (job- or step-level --
      # actionlint confirmed both), so the presence check is computed here,
      # where env: CAN reference secrets, and read back via env.* in the
      # step's if: below, where env IS an allowed context.
      HAS_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # so Claude can read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code
        if: ${{ env.HAS_ANTHROPIC_KEY == 'true' }}
        uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1
        env:
          # claude-code-action reads ANTHROPIC_API_KEY from env when the
          # anthropic_api_key input is omitted (confirmed against the
          # action's source: `inputs.anthropic_api_key || env.ANTHROPIC_API_KEY`).
          # env: is the idiomatic place for a secret passed to a step (FIXLOG.md DEVOPS1).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          additional_permissions: |
            actions: read
          claude_args: |
            --allowedTools "Edit,Write,Read,Bash(node:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git rev-parse:*),Bash(git ls-files:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr checks:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh api repos/*/pulls/*/comments:*),Bash(gh api repos/*/issues/*/comments:*),mcp__github_inline_comment__create_inline_comment"
