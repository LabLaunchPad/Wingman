name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node plugins/wingman/scripts/validate-structure.mjs
      - run: node scripts/check-repo-consistency.mjs
