name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
      - run: node plugins/wingman/scripts/validate-structure.mjs
      - run: node scripts/check-repo-consistency.mjs
      - run: node scripts/check-fixtures.mjs
      - run: node plugins/wingman/scripts/check-traceability.mjs
      - run: node plugins/wingman/scripts/check-harness-adapter-drift.mjs
      - run: node plugins/wingman/scripts/generate-harness-adapters.mjs --check
