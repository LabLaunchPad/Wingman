name: Evals (headless)

# The behavioral eval harness's scheduled/on-demand tier. The DETERMINISTIC
# fixture-execution check runs on every PR inside validate.yml (no key); this
# workflow is the expensive, stochastic, model-in-the-loop tier — run weekly
# and on demand only, never per-PR, to control token cost (the two-tier split
# from vendor/gstack's evals.yml + evals-periodic.yml). Grading stays human:
# it captures transcripts, it does not assert a pass. Needs ANTHROPIC_API_KEY;
# with no key the runner degrades to a dry-run integrity check.

on:
  workflow_dispatch:
    inputs:
      depth:
        description: "How many eval cases to run"
        type: choice
        options: [quick, standard, deep]
        default: standard
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  headless-evals:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"

      - name: Pin Claude Code CLI version
        id: cli-version
        run: echo "version=$(npm view @anthropic-ai/claude-code version)" >> "$GITHUB_OUTPUT"

      - name: Cache Claude Code CLI
        id: cache-claude-cli
        uses: actions/cache@v4 # TODO(human): pin to an exact commit SHA to match this repo's other actions (couldn't verify the real SHA from this sandbox - no network access to api.github.com for actions/cache)
        with:
          path: ~/.npm-global
          key: claude-code-cli-${{ steps.cli-version.outputs.version }}

      - name: Install the Claude Code CLI
        if: steps.cache-claude-cli.outputs.cache-hit != 'true'
        run: npm install -g --prefix ~/.npm-global @anthropic-ai/claude-code

      - name: Add cached CLI to PATH
        run: echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"

      - name: Run headless evals (degrades to a dry-run integrity check with no key)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVAL_DEPTH: ${{ github.event.inputs.depth || 'standard' }}
        run: node evals/run-headless.mjs --depth "$EVAL_DEPTH"

      - name: Upload eval transcripts for human grading
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-transcripts
          path: evals/.artifacts/
          if-no-files-found: ignore
