name: Claude Code Review

# Auto-reviews PRs. Pattern from
# vendor/wshobson-agents/.github/workflows/claude-code-review.yml. Gated to
# non-draft, non-dependabot, SAME-REPO PRs only (head.repo == repository) so a
# fork PR can never trigger a job holding a token — the load-bearing
# fork-safety pattern. Read-only + inline-comment tools only; the review prompt
# is scoped to Wingman's real invariants.
#
# Also gated on the ANTHROPIC_API_KEY secret being present -- computed into
# the job's HAS_ANTHROPIC_KEY env var below (env: CAN reference secrets) and
# read back via env.* on the claude-code-action step's own `if:`. `secrets`
# is not a valid context inside if: at all, job- or step-level (actionlint
# rejected both direct attempts as an expression error before this env-var
# indirection was found). Confirmed by a real failure on PR #9: without this
# guard, the step runs anyway, gets partway into claude-code-action's own
# git-auth step with no usable token, and fails with a red X plus a stale
# "Claude Code is working…" comment that never resolves -- not the "degrades
# gracefully" claim this repo originally documented for a missing key. This
# guard makes it skip cleanly instead.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: |
      github.event.pull_request.draft == false &&
      github.actor != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # secrets are not a valid context inside if: (job- or step-level --
      # actionlint confirmed both), so the presence check is computed here,
      # where env: CAN reference secrets, and read back via env.* in the
      # step's if: below, where env IS an allowed context.
      HAS_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code Review
        if: ${{ env.HAS_ANTHROPIC_KEY == 'true' }}
        uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1
        env:
          # claude-code-action reads ANTHROPIC_API_KEY from env when the
          # anthropic_api_key input is omitted (confirmed against the
          # action's source: `inputs.anthropic_api_key || env.ANTHROPIC_API_KEY`).
          # env: is the idiomatic place for a secret passed to a step (FIXLOG.md DEVOPS1).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a PR for Wingman — a Claude Code plugin (markdown
            commands/agents/skills + dependency-free Node validators; no build,
            no npm deps) that gives non-technical founders a full AI SDLC. Read
            `CLAUDE.md` and `docs/ARCHITECTURE.md` before starting.

            ## Review checklist (flag only real issues)

            1. **Mechanical validators** — would this break
               `node plugins/wingman/scripts/validate-structure.mjs`,
               `node scripts/check-repo-consistency.mjs`,
               `node scripts/check-fixtures.mjs`, or
               `node plugins/wingman/scripts/check-traceability.mjs`? Run them
               if unsure.
            2. **Manifest integrity** — `plugin.json` must declare every new
               command/agent/skill with a `./` prefix, must NOT declare a
               `hooks` field (hooks/hooks.json auto-loads), and shipped content
               changes require a `plugin.json` `version` bump (else
               `claude plugin update` no-ops). `boardroom-cto` and
               `boardroom-ciso` must be `model: opus`.
            3. **The "docs/ isn't installed" bug class** — repo-root `docs/`
               does NOT ship with the plugin. Flag any shipped skill/agent
               template under `plugins/wingman/` that depends on a `docs/*`
               path for runtime/operational use (citations are fine; a
               dependency is not).
            4. **Founder-facing tone** — any checkpoint/verdict/status output
               must meet the `plain-language-checkpoint` bar (no unexplained
               jargon, lead with consequence). Internal-only channels are
               governed by `token-economy` instead.
            5. **Security / CI hygiene** — no secrets in code or workflows; no
               destructive git in scripts; new workflows must pin action SHAs
               and set `persist-credentials: false` (match
               `.github/workflows/validate.yml`); the safety-gate hook
               (`boardroom-checkpoint.mjs`) must stay fail-safe.

            ## Output rules
            - Inline comments (`mcp__github_inline_comment__create_inline_comment`)
              for line-specific issues; one short summary (≤ 10 lines) via
              `gh pr comment` at the end.
            - If nothing critical, post a single ✅ one-liner and stop.
            - Be concise: one sentence per finding, prefer diff suggestions.
            - Don't nitpick prose/formatting; don't re-raise points already in
              the PR's existing comments (read them first).
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(node:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api repos/*/pulls/*/comments:*)"
