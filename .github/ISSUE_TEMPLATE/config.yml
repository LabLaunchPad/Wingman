blank_issues_enabled: false
contact_links:
  - name: Question about how Wingman works
    about: Read CLAUDE.md and docs/ARCHITECTURE.md first — most "how does X work" questions are answered there. If still unclear, open a Discussion instead of an issue.
    url: https://github.com/LabLaunchPad/Wingman/discussions
  - name: Security vulnerability
    about: Do not open a public issue for a security vulnerability. See SECURITY.md (or contact the maintainers directly) for private disclosure.
    url: https://github.com/LabLaunchPad/Wingman/security/advisories/new
